<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Word Analyzer</h1>
        <p>Type or paste your text below to analyze word frequencies.</p>
      </header>
      
      <div class="input-section">
        <textarea id="word-input" placeholder="Enter text here..."></textarea>
      </div>
      
      <button id="analyze-btn">Analyze Words</button>

      <section class="output-section" id="output-section" style="display: none;">
        <h2>Results</h2>
        <div id="results-content"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
